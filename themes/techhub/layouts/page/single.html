{{ define "main" }}
<div class="container container-page-wrapper" style="margin-top: 3rem; margin-bottom: 4rem;">
    <article class="legal-page" style="max-width: 760px; margin: 0 auto;">
        <header class="page-header" style="margin-bottom: 2rem; border-bottom: 1px solid var(--border-subtle); padding-bottom: 1rem;">
            <h1 class="page-title" style="font-family: 'Cinzel', serif; font-size: 2.25rem; color: var(--accent-gold);">{{ .Title }}</h1>
        </header>
        <div class="page-content" style="color: var(--text-secondary); line-height: 1.8; font-size: 1.05rem;">
            {{ .Content }}
        </div>
    </article>
</div>
{{ end }}
