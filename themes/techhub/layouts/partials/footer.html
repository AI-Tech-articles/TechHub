<footer class="site-footer" role="contentinfo">
    <div class="container">
        <div class="footer-brand">
            <span class="footer-logo">T</span>
            <span class="footer-name">{{ .Site.Title }}</span>
        </div>
        
        <nav class="footer-nav" aria-label="Footer legal links">
            <a href="{{ "/privacy-policy/" | relURL }}" class="footer-link">Privacy Policy</a>
            <span class="footer-sep">&bull;</span>
            <a href="{{ "/terms/" | relURL }}" class="footer-link">Terms of Service</a>
            <span class="footer-sep">&bull;</span>
            <a href="{{ "/contact/" | relURL }}" class="footer-link">Contact</a>
        </nav>

        <p class="footer-text">
            &copy; {{ now.Format "2006" }} {{ .Site.Params.author | default .Site.Title }}. All rights reserved.
        </p>
        <p class="footer-meta">
            Premium AI &amp; Technology Research
        </p>
    </div>
</footer>
